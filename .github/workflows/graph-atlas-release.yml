name: Graph Atlas Release

on:
  workflow_dispatch:
  push:
    tags:
      - "graph-atlas-v*"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: graph-atlas-pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    defaults:
      run:
        working-directory: graph-atlas

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: graph-atlas/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        run: npm run release:verify

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Run release preview smoke
        run: npm run test:release:preview
        env:
          GRAPH_ATLAS_E2E_BROWSER: chromium

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: graph-atlas/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
