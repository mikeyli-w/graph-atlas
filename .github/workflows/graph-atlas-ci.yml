name: Graph Atlas CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  graph-atlas-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: graph-atlas

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: graph-atlas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Run release preview smoke
        run: npm run test:release:preview
        env:
          GRAPH_ATLAS_E2E_BROWSER: chromium

      - name: Run browser smoke tests
        run: npm run test:e2e:ci

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            graph-atlas/playwright-report/
            graph-atlas/test-results/
          if-no-files-found: ignore
          retention-days: 7
