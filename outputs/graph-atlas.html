<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph Atlas - 个人知识库</title>
    <link rel="stylesheet" href="../graph-atlas/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="vault-sidebar">
        <div class="vault-header">
          <div class="vault-mark">GA</div>
          <div>
            <div class="vault-title">Graph Atlas</div>
            <div class="vault-status">本地加密 vault 已连接</div>
          </div>
        </div>
        <button class="nav-item active" type="button"><span class="nav-glyph">MAP</span>图谱</button>
        <button class="nav-item" type="button"><span class="nav-glyph">BOX</span>收集箱<span class="count">12</span></button>
        <div class="section-title"><span>知识库</span><button type="button">+</button></div>
        <div class="tree" id="tree"></div>
        <div class="section-title"><span>标签</span><button type="button">+</button></div>
        <div class="tags" id="tags"></div>
        <div class="sidebar-footer">
          <button type="button">设置</button>
          <button type="button" id="reset">重置</button>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="history-controls"><button type="button">‹</button><button type="button">›</button></div>
          <label class="command-bar"><span>⌘K</span><input id="search" placeholder="搜索或输入命令..." /></label>
          <div class="top-actions">
            <select id="tag-filter"></select>
            <button type="button" id="new-note">新笔记</button>
          </div>
        </header>

        <div class="atlas">
          <section class="graph-panel">
            <div class="graph-header">
              <div>
                <h1>我的知识图谱</h1>
                <span id="visible-count">9 个节点可见</span>
              </div>
              <div class="graph-tools">
                <button type="button" id="clear-search">清除搜索</button>
                <button type="button" id="zoom-in-top">放大</button>
              </div>
            </div>
            <div class="graph-canvas" aria-label="个人资料关系图谱">
              <canvas id="graph-lines" aria-hidden="true"></canvas>
              <div id="graph-nodes"></div>
              <div class="zoom-control">
                <button type="button" id="zoom-out">-</button>
                <span id="zoom-label">100%</span>
                <button type="button" id="zoom-in">+</button>
              </div>
            </div>
            <section class="recent-panel">
              <div class="recent-head">
                <h2>最近更新</h2>
                <button type="button">列表视图</button>
              </div>
              <div class="recent-table" id="recent-table"></div>
            </section>
          </section>
          <aside class="detail-panel" id="detail"></aside>
        </div>
      </section>
    </main>

    <script>
      const vaultTree = [
        ["个人资料", ["个人资料", "身份证", "护照", "微信账号"]],
        ["工作", ["工作经历", "项目记录", "合同索引"]],
        ["人脉", ["联系人", "紧急联系人"]],
        ["资料", ["文件资料", "证书附件"]],
        ["生活", ["旅行清单", "重要笔记"]],
      ];

      const initialNodes = [
        node("passport", "护照", "证件", "PAS", "#9d6bff", 50, 47, "高（仅自己可见）", ["证件", "护照", "出境"], "今天 10:23", "2023-01-15", true, [["护照首页.jpg", "1.2 MB", "2023-01-15"], ["签证记录.pdf", "812 KB", "2024-07-22"]], [["个人资料", "属于"], ["身份证", "关联证件"], ["微信账号", "用于登录"], ["联系人", "紧急联系人"], ["工作经历", "相关证明"], ["文件资料", "包含"], ["旅行清单", "计划使用"], ["重要笔记", "相关笔记"]], "# 护照信息\n- 持有人：示例用户\n- 护照号：DEMO-PASSPORT-001\n- 签发地：示例签发地\n- 签发日期：2023-01-10\n- 有效期至：2033-01-09\n- 备注：妥善保管，过期前及时续签"),
        node("profile", "个人资料", "档案", "USR", "#a6a7b5", 50, 17, "中（加密保存）", ["个人", "核心"], "今天 09:40", "2022-09-01", false, [["个人信息总览.md", "44 KB", "2025-05-12"]], [["护照", "拥有"], ["身份证", "拥有"], ["联系人", "关联"]], "# 个人资料\n- 姓名：示例用户\n- 城市：示例城市\n- 手机：DEMO-PHONE-001\n- 邮箱：demo@example.invalid\n- 用作所有个人资料的索引入口"),
        node("idcard", "身份证", "证件", "ID", "#78d88c", 26, 34, "高（仅自己可见）", ["证件", "身份"], "今天 09:15", "2021-06-06", false, [["身份证正面.jpg", "948 KB", "2024-09-18"], ["身份证反面.jpg", "902 KB", "2024-09-18"]], [["护照", "关联证件"], ["个人资料", "属于"]], "# 身份证资料\n- 姓名：示例用户\n- 证件号码：DEMO-ID-001\n- 签发机关：示例签发机关\n- 到期提醒：2030-06-01"),
        node("wechat", "微信账号", "账号", "WX", "#7bdc85", 76, 34, "中（加密保存）", ["账号", "社交"], "2025-05-10", "2020-03-18", false, [], [["护照", "用于登录"], ["联系人", "通讯录"]], "# 微信账号\n- 用途：社交与登录\n- 绑定手机：DEMO-PHONE-001\n- 恢复方式：手机短信 + 邮箱\n- 注意：不记录明文密码"),
        node("contacts", "联系人", "人脉", "REL", "#77a8ff", 81, 56, "中（加密保存）", ["联系人", "紧急"], "2025-05-12", "2023-02-01", false, [["紧急联系人清单.csv", "24 KB", "2025-05-12"]], [["护照", "紧急联系人"], ["微信账号", "通讯录"]], "# 联系人\n- 示例联系人甲：紧急联系人\n- 示例联系人乙：工作证明联系人\n- 备注：出境前同步更新紧急联系人"),
        node("files", "文件资料", "文件", "DIR", "#6d9cff", 20, 56, "中（加密保存）", ["资料", "附件"], "昨天 18:42", "2024-01-08", false, [["资料目录索引.xlsx", "156 KB", "2025-05-16"]], [["护照", "包含"], ["身份证", "包含"]], "# 文件资料\n- 证件扫描件\n- 工作证明\n- 旅行材料\n- 重要文件只保存索引，不保存敏感原件"),
        node("work", "工作经历", "经历", "JOB", "#e4b94b", 50, 68, "低（可导出）", ["工作", "经历"], "昨天 18:42", "2020-10-01", false, [["工作证明-示例用户.pdf", "1.4 MB", "2025-03-18"]], [["护照", "相关证明"], ["文件资料", "归档"]], "# 工作经历\n- 2020-2023：产品经理\n- 2023-至今：独立项目\n- 可用于签证、人职、简历与背景资料"),
        node("travel", "旅行清单", "生活", "AIR", "#72a5ff", 34, 78, "低（可导出）", ["旅行", "计划"], "昨天 16:30", "2024-11-20", false, [["日本旅行材料.zip", "8.1 MB", "2025-04-20"]], [["护照", "计划使用"], ["文件资料", "材料"]], "# 日本旅行计划\n- 护照有效期检查\n- 签证材料\n- 酒店与航班\n- 紧急联系人"),
        node("notes", "重要笔记", "笔记", "NT", "#d99b55", 65, 78, "中（加密保存）", ["笔记", "提醒"], "昨天 14:08", "2024-06-13", false, [], [["护照", "相关笔记"], ["旅行清单", "提醒"]], "# 重要笔记\n- 护照有效期剩余超过 6 个月才可出境多数国家\n- 如信息变更，请及时更新并重新扫描存档"),
      ];

      const edges = [["passport", "profile", "属于"], ["passport", "idcard", "关联证件"], ["passport", "wechat", "用于登录"], ["passport", "contacts", "紧急联系人"], ["passport", "files", "包含"], ["passport", "work", "相关证明"], ["passport", "travel", "计划使用"], ["passport", "notes", "相关笔记"]];
      let nodes = JSON.parse(localStorage.getItem("graph-atlas-static") || "null") || initialNodes;
      let activeId = "passport";
      let activeTab = "概览";
      let tagFilter = "全部";
      let zoom = 100;

      function node(id, title, type, icon, color, x, y, privacy, tags, updated, created, favorite, attachments, links, preview) {
        return { id, title, type, icon, color, x, y, privacy, tags, updated, created, favorite, attachments: attachments.map(([name, size, date]) => ({ name, size, date })), links, preview };
      }

      function allTags() {
        return ["全部", ...Array.from(new Set(nodes.flatMap((item) => item.tags)))];
      }

      function filteredNodes() {
        const query = document.getElementById("search").value.trim().toLowerCase();
        return nodes.filter((item) => {
          const text = [item.title, item.type, item.preview, item.tags.join(" ")].join(" ").toLowerCase();
          return (!query || text.includes(query)) && (tagFilter === "全部" || item.tags.includes(tagFilter));
        });
      }

      function render() {
        localStorage.setItem("graph-atlas-static", JSON.stringify(nodes));
        renderTree();
        renderTags();
        renderFilters();
        renderGraph();
        renderRecent();
        renderDetail();
      }

      function renderTree() {
        document.getElementById("tree").innerHTML = vaultTree.map(([label, children]) => `
          <div class="tree-group">
            <div class="tree-label">⌄ ${label}</div>
            ${children.map((child) => `<button class="tree-child ${active().title === child ? "active" : ""}" type="button" data-tree="${child}"><span class="doc-dot"></span>${child}</button>`).join("")}
          </div>
        `).join("");
        document.querySelectorAll("[data-tree]").forEach((button) => {
          button.onclick = () => {
            const found = nodes.find((item) => item.title === button.dataset.tree);
            if (found) {
              activeId = found.id;
              render();
            }
          };
        });
      }

      function renderTags() {
        document.getElementById("tags").innerHTML = allTags().slice(1).map((tag) => `
          <button class="tag ${tagFilter === tag ? "active" : ""}" type="button" data-tag="${tag}">#${tag}<span>${nodes.filter((item) => item.tags.includes(tag)).length}</span></button>
        `).join("");
        document.querySelectorAll("[data-tag]").forEach((button) => {
          button.onclick = () => {
            tagFilter = button.dataset.tag;
            render();
          };
        });
      }

      function renderFilters() {
        document.getElementById("visible-count").textContent = `${filteredNodes().length} 个节点可见`;
        const select = document.getElementById("tag-filter");
        select.innerHTML = allTags().map((tag) => `<option value="${tag}" ${tag === tagFilter ? "selected" : ""}>${tag}</option>`).join("");
      }

      function renderGraph() {
        const wrap = document.querySelector(".graph-canvas");
        const canvas = document.getElementById("graph-lines");
        const ctx = canvas.getContext("2d");
        const rect = wrap.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        canvas.width = rect.width * ratio;
        canvas.height = rect.height * ratio;
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
        ctx.clearRect(0, 0, rect.width, rect.height);
        edges.forEach(([fromId, toId, label]) => {
          const from = nodes.find((item) => item.id === fromId);
          const to = nodes.find((item) => item.id === toId);
          if (!from || !to) return;
          const x1 = from.x / 100 * rect.width;
          const y1 = from.y / 100 * rect.height;
          const x2 = to.x / 100 * rect.width;
          const y2 = to.y / 100 * rect.height;
          const activeEdge = fromId === activeId || toId === activeId;
          ctx.strokeStyle = activeEdge ? "rgba(157, 107, 255, .72)" : "rgba(180, 186, 206, .22)";
          ctx.lineWidth = 1;
          ctx.setLineDash(label.includes("相关") || label.includes("计划") ? [4, 5] : []);
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          ctx.setLineDash([]);
          if (activeEdge && zoom >= 90) {
            ctx.fillStyle = "rgba(220, 222, 232, .72)";
            ctx.font = "12px Inter, system-ui, sans-serif";
            ctx.fillText(label, (x1 + x2) / 2 + 8, (y1 + y2) / 2 - 8);
          }
        });
        document.getElementById("graph-nodes").innerHTML = filteredNodes().map((item) => `
          <button class="graph-node ${item.id === activeId ? "active" : ""}" type="button" data-node="${item.id}" style="--x:${item.x}%;--y:${item.y}%;--node-color:${item.color};transform:translate(-50%, -50%) scale(${zoom / 100})">
            <span>${item.icon}</span><strong>${item.title}</strong>
          </button>
        `).join("");
        document.querySelectorAll("[data-node]").forEach((button) => {
          button.onclick = () => {
            activeId = button.dataset.node;
            render();
          };
        });
        document.getElementById("zoom-label").textContent = `${zoom}%`;
      }

      function renderRecent() {
        document.getElementById("recent-table").innerHTML = `
          <div class="recent-row header"><span>标题</span><span>所在位置</span><span>更新时间</span></div>
          ${nodes.slice(0, 6).map((item) => `
            <button class="recent-row ${item.id === activeId ? "active" : ""}" type="button" data-recent="${item.id}">
              <span><b style="color:${item.color}">${item.icon}</b>${item.title}</span><span>${item.type} / ${item.tags[0]}</span><span>${item.updated}</span>
            </button>
          `).join("")}
        `;
        document.querySelectorAll("[data-recent]").forEach((button) => {
          button.onclick = () => {
            activeId = button.dataset.recent;
            render();
          };
        });
      }

      function renderDetail() {
        const item = active();
        const tabs = ["概览", "属性", "关系", "历史"];
        document.getElementById("detail").innerHTML = `
          <div class="detail-title">
            <div class="node-badge" style="--node-color:${item.color}">${item.icon}</div>
            <div><h2>${item.title}</h2><span>${item.type}</span></div>
            <button class="star ${item.favorite ? "active" : ""}" type="button" id="favorite">★</button>
          </div>
          <div class="detail-tabs">${tabs.map((tab) => `<button class="${activeTab === tab ? "active" : ""}" type="button" data-tab="${tab}">${tab}</button>`).join("")}</div>
          ${tabContent(item)}
          <section class="info-block"><h3>内容预览</h3><pre>${escapeHtml(item.preview)}</pre></section>
        `;
        document.getElementById("favorite").onclick = () => updateActive({ favorite: !item.favorite });
        document.querySelectorAll("[data-tab]").forEach((button) => {
          button.onclick = () => {
            activeTab = button.dataset.tab;
            render();
          };
        });
        const privacy = document.getElementById("privacy");
        if (privacy) privacy.onchange = () => updateActive({ privacy: privacy.value });
        const preview = document.getElementById("preview");
        if (preview) preview.oninput = () => updateActive({ preview: preview.value });
        document.querySelectorAll("[data-link]").forEach((button) => {
          button.onclick = () => {
            const found = nodes.find((candidate) => candidate.title === button.dataset.link);
            if (found) {
              activeId = found.id;
              activeTab = "概览";
              render();
            }
          };
        });
      }

      function tabContent(item) {
        if (activeTab === "属性") {
          return `<section class="info-block"><h3>Markdown 内容</h3><textarea id="preview" rows="14">${escapeHtml(item.preview)}</textarea></section>`;
        }
        if (activeTab === "关系") {
          return `<section class="info-block"><h3>关系说明</h3><div class="relationship-list">${item.links.map(([title, relation]) => `<div><strong>${title}</strong><span>${relation}</span></div>`).join("")}</div></section>`;
        }
        if (activeTab === "历史") {
          return `<section class="info-block"><h3>变更历史</h3>${["刚刚保存到本地", "今天同步标签", "昨天更新附件索引"].map((text) => `<div class="history-item">${text}</div>`).join("")}</section>`;
        }
        return `
          <section class="info-block"><h3>基本信息</h3>
            <div class="field-row"><span>类型</span><strong>${item.type}</strong></div>
            <label class="field-row"><span>隐私级别</span><select id="privacy">${["高（仅自己可见）", "中（加密保存）", "低（可导出）"].map((value) => `<option ${value === item.privacy ? "selected" : ""}>${value}</option>`).join("")}</select></label>
            <div class="field-row"><span>创建时间</span><strong>${item.created}</strong></div>
            <div class="field-row"><span>更新时间</span><strong>${item.updated}</strong></div>
          </section>
          <section class="info-block"><h3>标签</h3><div class="tag-chips">${item.tags.map((tag) => `<span>${tag}</span>`).join("")}<button type="button">+</button></div></section>
          <section class="info-block"><h3>关联笔记（${item.links.length}）</h3><div class="link-list">${item.links.map(([title, relation]) => `<button type="button" data-link="${title}"><span>${title}</span><small>${relation}</small></button>`).join("")}</div></section>
          <section class="info-block"><h3>附件（${item.attachments.length}）</h3><div class="attachments">${item.attachments.length ? item.attachments.map((file) => `<div class="attachment"><span>FILE</span><div><strong>${file.name}</strong><small>${file.size} · ${file.date}</small></div></div>`).join("") : "<p>暂无附件，可先保存文件索引。</p>"}</div></section>
        `;
      }

      function active() {
        return nodes.find((item) => item.id === activeId) || nodes[0];
      }

      function updateActive(patch) {
        nodes = nodes.map((item) => item.id === activeId ? { ...item, ...patch, updated: "刚刚" } : item);
        render();
      }

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" })[char]);
      }

      document.getElementById("search").oninput = render;
      document.getElementById("tag-filter").onchange = (event) => {
        tagFilter = event.target.value;
        render();
      };
      document.getElementById("clear-search").onclick = () => {
        document.getElementById("search").value = "";
        tagFilter = "全部";
        render();
      };
      document.getElementById("zoom-out").onclick = () => {
        zoom = Math.max(70, zoom - 10);
        render();
      };
      document.getElementById("zoom-in").onclick = document.getElementById("zoom-in-top").onclick = () => {
        zoom = Math.min(140, zoom + 10);
        render();
      };
      document.getElementById("reset").onclick = () => {
        nodes = initialNodes;
        activeId = "passport";
        localStorage.removeItem("graph-atlas-static");
        render();
      };
      document.getElementById("new-note").onclick = () => {
        const id = `note-${Date.now()}`;
        nodes.push(node(id, "新的个人笔记", "笔记", "NEW", "#c89cff", 42 + Math.random() * 24, 38 + Math.random() * 28, "中（加密保存）", ["笔记"], "刚刚", "今天", false, [], [["护照", "待关联"]], "# 新的个人笔记\n- 在这里记录一条新的个人资料线索\n- 可继续补充标签、附件和关系"));
        activeId = id;
        render();
      };
      window.addEventListener("resize", renderGraph);
      render();
    </script>
  </body>
</html>
